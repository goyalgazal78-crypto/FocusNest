<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusNest Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <!-- PW-STYLE NAVBAR -->
  <nav class="pw-nav">
    <div class="pw-nav-inner">
      <a href="index.html" class="pw-logo">
        <span class="pw-logo-icon">🎯</span>
        <span class="pw-logo-text">FocusNest</span>
      </a>
      <div class="pw-actions">
        <button class="dark-pill" onclick="toggleDark()" id="darkToggleBtn">
          <i class="ti ti-moon" id="darkIcon"></i>
          <span id="darkLabel">Dark</span>
        </button>
        <a href="index.html" class="pw-btn-home">⬅ Back to Home</a>
      </div>
    </div>
  </nav>

  <div class="login-card">
    <h1 class="login-title">FocusNest</h1>
    <h5 class="mb-4">Login to Continue</h5>

    <input type="email"    id="email"    class="form-control" placeholder="Enter Email">
    <input type="password" id="password" class="form-control" placeholder="Enter Password">

    <button class="login-btn" onclick="loginUser()">Login</button>

    <p class="mt-3" style="font-size:14px;color:#888;">Don't have an account? <a href="signup.html" style="color:#6a11cb;font-weight:700;">Sign Up Free</a></p>

    <p id="message" class="mt-3 text-danger"></p>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom Script -->
  <script src="login.js"></script>

  <!-- ===== CHATBOT FAB ===== -->
  <button id="fn-fab" aria-label="Open AI Study Assistant">
    <span id="fn-badge">1</span>
    <span class="ic-chat">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
           stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </span>
    <span class="ic-close">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="#fff" stroke-width="2.6" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </span>
  </button>

  <!-- ===== CHATBOT WINDOW ===== -->
  <div id="fn-chat" role="dialog" aria-label="FocusNest AI Assistant">
    <div class="fn-header">
      <div class="fn-avatar">🦉</div>
      <div class="fn-header-text">
        <strong>FocusNest AI</strong>
        <small><span class="fn-dot"></span>Your study assistant · always here</small>
      </div>
      <button class="fn-clear" onclick="fnClearChat()">Clear</button>
    </div>

    <div class="fn-messages" id="fn-messages"></div>

    <div class="fn-chips">
      <button class="fn-chip" onclick="fnChip('How does the Pomodoro technique work?')">⏳ Pomodoro</button>
      <button class="fn-chip" onclick="fnChip('Give me a quick study motivation quote')">💪 Motivate me</button>
      <button class="fn-chip" onclick="fnChip('How can FocusNest help me study better?')">📚 FocusNest help</button>
      <button class="fn-chip" onclick="fnChip('How do I manage my tasks effectively?')">📋 Task tips</button>
    </div>

    <div class="fn-input-bar">
      <input id="fn-input" type="text" placeholder="Ask anything about studying…" autocomplete="off"
             onkeydown="if(event.key==='Enter') fnSend()">
      <button id="fn-send" onclick="fnSend()" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="fn-note">Powered by AI · FocusNest 2026</div>
  </div>

  <!-- ===== CHATBOT SCRIPT ===== -->
  <script src="chatbot.js"></script>

</body>
</html>
